        .saved-tag { font-size: 0.6rem; padding: 2px 6px; background: #333; border-radius: 3px; margin-right: 8px; }

   <script>
    const pb = new PocketBase('https://restperiod.org');

    // 1. DATA STATE
    let builderList = []; 
    let activeFilters = [];
    let modalActiveTags = []; 
    let editingTemplateId = null;

    // 2. MASTER FILTER CATEGORIES (Source of Truth for sidebar AND modal)
    const filterGroups = {
        "MOVEMENT": { "PUSH": "PUSH", "PULL": "PULL", "SQUAT": "SQUAT", "HINGE": "HINGE" },
        "ANGLE": { "HOR": "HORIZONTAL", "VER": "VERTICAL" },
        "LIMBS": { "DA": "DOUBLE ARM", "DL": "DOUBLE LEG", "SA": "SINGLE ARM", "SL": "SINGLE LEG" },
        "EQUIPMENT": { "BB": "BARBELL", "DB": "DUMBBELL", "BW": "BODYWEIGHT", "BND": "BAND" },
        "TYPE": { "MOB": "MOBILITY", "PRIMER": "PRIMER" },
        "BODY PART": { "UB": "UPPER BODY", "LB": "LOWER BODY" }
    };

    window.onload = async () => {
        if(!pb.authStore.isValid) window.location.href = 'index.html';
        setupFilters();
        await loadCustomExercises();
        await fetchSavedTemplates();
        renderLibrary();
    };

    // --- MODAL & TAG LOGIC ---
    function openModal(id) {
        document.getElementById(id).style.display = 'block';
        if (id === 'addExModal') {
            modalActiveTags = []; 
            buildModalTags();
        }
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function buildModalTags() {
        const container = document.getElementById('modal-tag-groups');
        let html = '';
        for (const [groupName, options] of Object.entries(filterGroups)) {
            html += `
                <div style="margin-bottom: 10px;">
                    <div style="font-size: 0.5rem; color: var(--brand-accent); font-weight: 800; margin-bottom: 5px;">${groupName}</div>
                    <div style="display: flex; flex-wrap: wrap; gap: 4px;">
                        ${Object.entries(options).map(([tag, label]) => `
                            <button class="filter-btn" type="button" onclick="toggleModalTag('${tag}', this)" style="font-size: 0.55rem; padding: 4px 8px;">${label}</button>
                        `).join('')}
                    </div>
                </div>`;
        }
        container.innerHTML = html;
    }

    function toggleModalTag(tag, btn) {
        if (modalActiveTags.includes(tag)) {
            modalActiveTags = modalActiveTags.filter(t => t !== tag);
            btn.classList.remove('active');
        } else {
            modalActiveTags.push(tag);
            btn.classList.add('active');
        }
    }

    async function saveNewExerciseToLib() {
        const name = document.getElementById('new-ex-name').value;
        const video = document.getElementById('new-ex-video').value;
        if (!name) return alert("Please enter a name.");

        const finalSearchStr = (name + " " + modalActiveTags.join(" ")).toUpperCase();
        try {
            await pb.collection('custom_exercises').create({ title: name, searchStr: finalSearchStr, video: video });
            alert("Added to Vault!");
            location.reload(); 
        } catch(e) { alert("Error: " + e.message); }
    }

    // --- VAULT SIDEBAR LOGIC ---
    function setupFilters() {
        const container = document.getElementById('filter-area');
        let html = '';
        for (const [groupName, options] of Object.entries(filterGroups)) {
            html += `
                <div style="width: 100%;">
                    <div style="font-size: 0.5rem; color: var(--brand-accent); font-weight: 800; margin-bottom: 5px; letter-spacing: 1px;">${groupName}</div>
                    <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom:10px;">
                        ${Object.entries(options).map(([tag, label]) => `
                            <button class="filter-btn" id="f-${tag}" onclick="toggleFilter('${tag}')">${label}</button>
                        `).join('')}
                    </div>
                </div>`;
        }
        container.innerHTML = html;
    }

    function toggleFilter(f) {
        const btn = document.getElementById(`f-${f}`);
        if(activeFilters.includes(f)) {
            activeFilters = activeFilters.filter(i => i !== f);
            btn.classList.remove('active');
        } else {
            activeFilters.push(f);
            btn.classList.add('active');
        }
        renderLibrary();
    }

    function renderLibrary() {
        const q = document.getElementById('search-input').value.toLowerCase();
        const results = exerciseDatabase.filter(e => {
            const matchesText = e.title.toLowerCase().includes(q) || e.searchStr.toLowerCase().includes(q);
            const matchesTags = activeFilters.every(tag => e.searchStr.toUpperCase().includes(tag));
            return matchesText && matchesTags;
        });

        document.getElementById('library-list').innerHTML = results.slice(0, 50).map(e => `
            <div class="search-result">
                <div class="res-title">${e.title.replace(/^([A-Z0-9-]{2,}\s*)+/, '')}</div>
                <button class="add-small" onclick="addToBuilder('${e.title.replace(/'/g, "\\'")}')">ADD +</button>
            </div>`).join('');
    }

    // --- BUILDER ACTIONS ---
    function addToBuilder(name) {
        // Strip prefixes like "PUSH BB" before adding to the builder list
        const cleanName = name.replace(/^([A-Z0-9-]{2,}\s*)+/, '');
        builderList.push({
            name: cleanName,
            grouping: "",
            setsData: [{ reps: "10", weight: "0", tempo: "3010", rpe: "7" }],
            notes: ""
        });
        renderBuilder();
    }

    function renderBuilder() {
        const container = document.getElementById('builder-area');
        if(builderList.length === 0) {
            container.innerHTML = `<div style="text-align:center; color:#555; padding: 40px; border: 2px dashed #333; border-radius: 6px;">Add exercises from the Vault to start building.</div>`;
            return;
        }
        container.innerHTML = builderList.map((ex, i) => `
            <div class="builder-item">
                <div class="item-header">
                    <div style="display:flex; gap:10px; align-items:center;">
                        <div style="display:flex; flex-direction:column; gap:2px;">
                            <i class="fas fa-chevron-up" style="cursor:pointer; font-size:0.7rem; color:var(--brand-accent);" onclick="moveItem(${i}, -1)"></i>
                            <i class="fas fa-chevron-down" style="cursor:pointer; font-size:0.7rem; color:var(--brand-accent);" onclick="moveItem(${i}, 1)"></i>
                        </div>
                        <div class="ex-title" style="color:var(--brand-accent); font-weight:800;">${ex.name}</div>
                    </div>
                    <i class="fas fa-trash" style="color:#d32f2f; cursor:pointer;" onclick="builderList.splice(${i},1); renderBuilder();"></i>
                </div>
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <input type="text" placeholder="Group (e.g. A1)" value="${ex.grouping || ''}" onchange="builderList[${i}].grouping = this.value" style="width:120px; padding:6px; margin-bottom:0;">
                    <input type="text" placeholder="Notes..." value="${ex.notes || ''}" onchange="builderList[${i}].notes = this.value" style="flex:1; padding:6px; margin-bottom:0;">
                </div>
                ${ex.setsData.map((set, sIndex) => `
                    <div class="metrics-grid" style="display: grid; grid-template-columns: 0.5fr 1fr 1fr 1fr 1fr 0.3fr; gap: 5px; margin-top: 5px; align-items:center;">
                        <div class="metric-col"><label style="font-size:0.5rem; color:var(--brand-accent);">SET ${sIndex+1}</label></div>
                        <div class="metric-col"><input type="text" value="${set.reps}" onchange="builderList[${i}].setsData[${sIndex}].reps = this.value" style="padding:4px; text-align:center;"></div>
                        <div class="metric-col"><input type="text" value="${set.weight}" onchange="builderList[${i}].setsData[${sIndex}].weight = this.value" style="padding:4px; text-align:center;"></div>
                        <div class="metric-col"><input type="text" value="${set.tempo}" onchange="builderList[${i}].setsData[${sIndex}].tempo = this.value" style="padding:4px; text-align:center;"></div>
                        <div class="metric-col"><input type="text" value="${set.rpe}" onchange="builderList[${i}].setsData[${sIndex}].rpe = this.value" style="padding:4px; text-align:center;"></div>
                        <i class="fas fa-minus-circle" style="color:#d32f2f; cursor:pointer;" onclick="builderList[${i}].setsData.splice(${sIndex},1); renderBuilder();"></i>
                    </div>`).join('')}
                <button class="btn btn-outline btn-small" style="margin-top:10px; width:auto; padding:4px 10px;" onclick="builderList[${i}].setsData.push({...builderList[${i}].setsData.slice(-1)[0]}); renderBuilder();">+ ADD SET</button>
            </div>`).join('');
    }

    // --- TEMPLATE PERSISTENCE ---
    async function fetchSavedTemplates() {
        try {
            const records = await pb.collection('templates').getFullList({ sort: '-created' });
            const container = document.getElementById('saved-templates-list');
            const warmups = records.filter(r => (r.type||'').toLowerCase() === 'warmup');
            const workouts = records.filter(r => (r.type||'').toLowerCase() === 'workout');

            const renderRow = (r) => `
                <div class="saved-row" style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #222; align-items:center;">
                    <span style="font-size:0.85rem; color:#eee;">${r.name}</span>
                    <div style="display:flex; gap:12px;">
                        <i class="fas fa-edit" style="color:var(--brand-accent); cursor:pointer;" onclick="loadTemplateIntoBuilder('${r.id}')"></i>
                        <i class="fas fa-trash" style="color:#d32f2f; cursor:pointer;" onclick="deleteTemplate('${r.id}')"></i>
                    </div>
                </div>`;

            container.innerHTML = `
                <div class="quad-title" style="color:#ff9800; font-size:0.7rem; font-weight:800; margin-top:15px; border-bottom:1px solid #333; padding-bottom:3px;">🔥 WARMUPS</div>
                ${warmups.length ? warmups.map(renderRow).join('') : '<div style="color:#444; font-size:0.7rem; padding:5px;">No Warmups found</div>'}
                <div class="quad-title" style="color:var(--brand-accent); font-size:0.7rem; font-weight:800; margin-top:20px; border-bottom:1px solid #333; padding-bottom:3px;">💪 MAIN SESSIONS</div>
                ${workouts.length ? workouts.map(renderRow).join('') : '<div style="color:#444; font-size:0.7rem; padding:5px;">No Sessions found</div>'}`;
        } catch(e) { console.error("Template fetch error:", e); }
    }

    async function loadTemplateIntoBuilder(id) {
        try {
            const record = await pb.collection('templates').getOne(id);
            editingTemplateId = record.id;
            builderList = (typeof record.workout_data === 'string') ? JSON.parse(record.workout_data) : record.workout_data;
            document.getElementById('template-name').value = record.name;
            document.getElementById('template-type').value = record.type;
            
            // Switch button to Update mode
            const saveBtn = document.getElementById('save-btn');
            if (saveBtn) saveBtn.innerText = "🆙 UPDATE EXISTING TEMPLATE";
            
            renderBuilder();
            window.scrollTo({top: 0, behavior: 'smooth'});
        } catch(e) { alert("Load Error: " + e.message); }
    }

    async function saveTemplateToDB() {
        const name = document.getElementById('template-name').value;
        const type = document.getElementById('template-type').value;
        if(!name || builderList.length === 0) return alert("Need name and exercises.");

        const data = { name, type, workout_data: builderList, creator: pb.authStore.model.id };
        try {
            if(editingTemplateId) await pb.collection('templates').update(editingTemplateId, data);
            else await pb.collection('templates').create(data);
            alert("Template saved successfully!");
            location.reload();
        } catch(e) { alert("Save Error: " + e.message); }
    }

    function moveItem(i, dir) {
        if(i+dir < 0 || i+dir >= builderList.length) return;
        [builderList[i], builderList[i+dir]] = [builderList[i+dir], builderList[i]];
        renderBuilder();
    }

    async function loadCustomExercises() { 
        try { 
            const recs = await pb.collection('custom_exercises').getFullList(); 
            recs.forEach(r => { if(!exerciseDatabase.some(e=>e.id===r.id)) exerciseDatabase.push({id:r.id, title:r.title, searchStr:r.searchStr||r.title}); }); 
        } catch(e){} 
    }

    async function deleteTemplate(id) { if(confirm("Permanently delete this template?")) { await pb.collection('templates').delete(id); fetchSavedTemplates(); } }
    function resetBuilder() { if(confirm("Clear current construction?")) { builderList=[]; editingTemplateId=null; document.getElementById('template-name').value=""; renderBuilder(); } }

</script>
</body>
</html>

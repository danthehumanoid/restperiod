<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rest Period</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.3/pocketbase.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Open+Sans:wght@400;600&display=swap');

        :root {
            --brand-bg: #020c12;
            --card-bg: #0e1b24;
            --brand-accent: #26C6DA;
            --brand-secondary: #2E7D32;
            --text-main: #E0F7FA;
            --input-bg: #001f30;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Open Sans', sans-serif;
            background: var(--brand-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 32px;
            letter-spacing: 2px;
        }

        .logo span { color: var(--brand-accent); }

        .card {
            background: var(--card-bg);
            border: 1px solid #1a2a35;
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 28px;
            background: #050d12;
            padding: 4px;
            border-radius: 8px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 6px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            color: #555;
            transition: 0.2s;
            border: none;
            background: none;
        }

        .tab.active {
            background: var(--brand-accent);
            color: #000;
        }

        /* Form */
        .form-group { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid #1a2a35;
            border-radius: 6px;
            color: white;
            padding: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--brand-accent);
        }

        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 6px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 0.85rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
            transition: 0.2s;
        }

        .btn-primary {
            background: var(--brand-accent);
            color: #000;
        }

        .btn-primary:hover { background: #1eb3c5; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .error {
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid #ff5252;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 0.8rem;
            color: #ff5252;
            margin-top: 12px;
            display: none;
        }

        .success {
            background: rgba(46, 125, 50, 0.1);
            border: 1px solid var(--brand-secondary);
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 0.8rem;
            color: #4ade80;
            margin-top: 12px;
            display: none;
        }

        .free-badge {
            background: rgba(38, 198, 218, 0.1);
            border: 1px solid rgba(38, 198, 218, 0.3);
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .free-badge strong { color: var(--brand-accent); }
    </style>
</head>
<body>

<div class="logo">REST <span>PERIOD</span></div>

<div class="card">
    <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Sign In</button>
        <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary" id="login-btn" onclick="login()">Sign In</button>
        <div class="error" id="login-error"></div>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signup-form" style="display:none;">
        <div class="free-badge">
            Create a <strong>free account</strong> to browse the exercise library and build basic programs.
        </div>
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="signup-name" placeholder="Your name" />
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="signup-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="signup-password" placeholder="At least 8 characters" />
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="signup-confirm" placeholder="Repeat password" />
        </div>
        <button class="btn btn-primary" id="signup-btn" onclick="signup()">Create Free Account</button>
        <div class="error" id="signup-error"></div>
        <div class="success" id="signup-success"></div>
    </div>
</div>

<script>
    const pb = new PocketBase('https://restperiod.org');

    // If already logged in, redirect
    if (pb.authStore.isValid) redirect(pb.authStore.model.role);

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
    }

    function redirect(role) {
        if (role === 'trainer' || role === 'admin') {
            window.location.href = '/dashboard.html';
        } else if (role === 'client') {
            window.location.href = '/program.html';
        } else {
            // free user
            window.location.href = '/free.html';
        }
    }

    async function login() {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const errEl = document.getElementById('login-error');
        const btn = document.getElementById('login-btn');

        errEl.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Signing in...';

        try {
            const auth = await pb.collection('users').authWithPassword(email, password);
            redirect(auth.record.role);
        } catch (e) {
            errEl.textContent = 'Invalid email or password.';
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    }

    async function signup() {
        const name = document.getElementById('signup-name').value.trim();
        const email = document.getElementById('signup-email').value.trim();
        const password = document.getElementById('signup-password').value;
        const confirm = document.getElementById('signup-confirm').value;
        const errEl = document.getElementById('signup-error');
        const successEl = document.getElementById('signup-success');
        const btn = document.getElementById('signup-btn');

        errEl.style.display = 'none';
        successEl.style.display = 'none';

        if (!name || !email || !password) {
            errEl.textContent = 'Please fill in all fields.';
            errEl.style.display = 'block';
            return;
        }

        if (password.length < 8) {
            errEl.textContent = 'Password must be at least 8 characters.';
            errEl.style.display = 'block';
            return;
        }

        if (password !== confirm) {
            errEl.textContent = 'Passwords do not match.';
            errEl.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Creating account...';

        try {
            await pb.collection('users').create({
                name,
                email,
                password,
                passwordConfirm: confirm,
                role: 'free',
                emailVisibility: true
            });

            // Auto login after signup
            const auth = await pb.collection('users').authWithPassword(email, password);
            redirect(auth.record.role);

        } catch (e) {
            const msg = e?.response?.data?.email?.message || e.message || 'Signup failed.';
            errEl.textContent = msg;
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Create Free Account';
        }
    }

    // Allow Enter key
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const loginVisible = document.getElementById('login-form').style.display !== 'none';
            if (loginVisible) login(); else signup();
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Stillness - Nidra Meditation (Worklet Stable)</title>
    
    <style>
        /* 🎨 COLOR SCHEME VARIABLES */
        :root {
            --primary-accent: #745c8b;
            --secondary-accent: #f68836;
            --tertiary-accent: #e279c8;
            --background-dark: #423049;
            --text-light: white;
            --text-muted: #aaa;
            --slider-track: #5d4a6a;
        }

        /* --- GENERAL & PLAYER STYLES --- */
        body {
            max-width: 80em;
            margin: 0 auto;
            padding: 5px;
            font-family: Georgia, serif;
            font-size: 18px;
            line-height: 1.6em;
            color: var(--text-light); 
            background-color: var(--background-dark); 
        }
        h1, h2, h3 {
            font-family: monospace;
            font-weight: normal;
            color: var(--primary-accent);
        }
        .player-container {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid var(--primary-accent);
            border-radius: 5px;
        }
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        /* --- SLIDER STYLES (Optimized for Mobile) --- */
        input[type="range"] {
            flex-grow: 1; 
            max-width: 300px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--slider-track); 
            border-radius: 5px;
            height: 8px;
            cursor: pointer;
            min-height: 30px; 
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; 
            appearance: none;
            width: 25px; 
            height: 25px;
            border-radius: 50%;
            background: var(--tertiary-accent);
            cursor: pointer;
            margin-top: -8.5px;
        }
        input[type="range"]::-moz-range-thumb {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: var(--tertiary-accent);
            cursor: pointer;
            border: none;
        }
        .volume-control span {
            font-family: monospace;
            color: var(--tertiary-accent);
            width: 40px; 
            text-align: right;
        }

        /* --- MANDALA STYLES & ANIMATIONS --- */
        .mandala-container {
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 50px auto;
        }
        .mandala-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }
        @keyframes rotateClockwise {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes rotateCounterClockwise {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }
        @keyframes pulseColor {
            0% { fill: var(--secondary-accent); opacity: 0.8; }
            50% { fill: var(--tertiary-accent); opacity: 0.95; }
            100% { fill: var(--secondary-accent); opacity: 0.8; }
        }
        @keyframes pulseColorAlt {
            0% { fill: var(--primary-accent); opacity: 0.9; }
            50% { fill: var(--text-light); opacity: 0.7; }
            100% { fill: var(--primary-accent); opacity: 0.9; }
        }
        @keyframes growShrink {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        .mandala-core { fill: var(--primary-accent); opacity: 0.9; }
        .mandala-petal-layer1 {
            fill: var(--secondary-accent);
            opacity: 0.8;
            transform-origin: center;
            animation: pulseColor 6s ease-in-out infinite alternate, rotateClockwise 30s linear infinite;
        }
        .mandala-petal-layer2 {
            fill: var(--tertiary-accent);
            opacity: 0.7;
            transform-origin: center;
            animation: pulseColorAlt 7s ease-in-out infinite alternate, rotateCounterClockwise 40s linear infinite;
        }
        .mandala-circle {
            fill: none;
            stroke: var(--secondary-accent);
            stroke-width: 0.8;
            opacity: 0.7;
            transform-origin: center;
            animation: rotateClockwise 25s linear infinite;
        }
        .mandala-glow {
            fill: none;
            stroke: var(--tertiary-accent);
            stroke-width: 0.2;
            opacity: 0.3;
            animation: growShrink 5s ease-in-out infinite alternate;
        }
        .mandala-circle circle:nth-child(3) {
            stroke: var(--primary-accent) !important;
        }
        .mandala-spinner circle { fill: var(--text-light); }
        .mandala-spinner path { fill: var(--primary-accent); }
        .sticking-pattern {
            font-size: 10px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <h1>Soul Stillness - Nidra</h1>

    <div class="player-container main-track">
        <h2>Spoken Meditation (Main Track)</h2>
        <audio id="spokenTrack" controls loop>
            <source src="meditation.wav" type="audio/wav"> 
            Your browser does not support the audio element.
        </audio>
    </div>

    <hr>

    <div class="player-container ambient-track">
        <h2>Soundscape</h2>
        <audio id="soundscapeTrack" src="soundscape.wav" loop volume="0"></audio> 
        
        <div class="volume-control">
            <label for="soundscapeVolume">Volume:</label>
            <input type="range" id="soundscapeVolume" min="0" max="1" step="0.01" value="0.5">
            <span id="soundscapeVolValue">50%</span>
        </div>
    </div>

    <div class="player-container ambient-track">
        <h2>Bird Sounds</h2>
        <audio id="birdsTrack" src="birds.wav" loop volume="0"></audio> 
        
        <div class="volume-control">
            <label for="birdsVolume">Volume:</label>
            <input type="range" id="birdsVolume" min="0" max="1" step="0.01" value="0.3">
            <span id="birdsVolValue">30%</span>
        </div>
    </div>

    <p class="sticking-pattern">Ensure your audio files are named **meditation.wav**, **soundscape.wav**, and **birds.wav**.</p>
    
    <div class="mandala-container">
        <svg class="mandala-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="8" class="mandala-core" />
            <circle cx="50" cy="50" r="48" class="mandala-glow" />

            <g class="mandala-petal-layer1">
                <path d="M 50 12 L 54 40 L 50 44 L 46 40 Z" transform="rotate(0 50 50)" />
                <path d="M 50 12 L 54 40 L 50 44 L 46 40 Z" transform="rotate(30 50 50)" />
                <path d="M 50 12 L 54 40 L 50 44 L 46 40 Z" transform="rotate(60 50 50)" />
                <path d="M 50 12 L 54 40 L 50 44 L 46 40 Z" transform="rotate(90 50 50)" />
                <path d="M 50 12 L 54 40 L 50 44 L 46 40 Z" transform="rotate(120 50 50)" />
                <path d="M 50 12 L 54 40 L 50 44 L 46 40 Z" transform="rotate(150 50 50)" />
                <path d="M 50 12 L 54 40 L 50 44 L 46 40 Z" transform="rotate(180 50 50)" />
                <path d="M 50 12 L 54 40 L 50 44 L 46 40 Z" transform="rotate(210 50 50)" />
                <path d="M 50 12 L 54 40 L 50 44 L 46 40 Z" transform="rotate(240 50 50)" />
                <path d="M 50 12 L 54 40 L 50 44 L 46 40 Z" transform="rotate(270 50 50)" />
                <path d="M 50 12 L 54 40 L 50 44 L 46 40 Z" transform="rotate(300 50 50)" />
                <path d="M 50 12 L 54 40 L 50 44 L 46 40 Z" transform="rotate(330 50 50)" />
            </g>

            <g class="mandala-petal-layer2">
                <path d="M 50 15 L 58 35 L 50 40 L 42 35 Z" transform="rotate(15 50 50)" /> 
                <path d="M 50 15 L 58 35 L 50 40 L 42 35 Z" transform="rotate(45 50 50)" />
                <path d="M 50 15 L 58 35 L 50 40 L 42 35 Z" transform="rotate(75 50 50)" />
                <path d="M 50 15 L 58 35 L 50 40 L 42 35 Z" transform="rotate(105 50 50)" />
                <path d="M 50 15 L 58 35 L 50 40 L 42 35 Z" transform="rotate(135 50 50)" />
                <path d="M 50 15 L 58 35 L 50 40 L 42 35 Z" transform="rotate(165 50 50)" />
                <path d="M 50 15 L 58 35 L 50 40 L 42 35 Z" transform="rotate(195 50 50)" />
                <path d="M 50 15 L 58 35 L 50 40 L 42 35 Z" transform="rotate(225 50 50)" />
                <path d="M 50 15 L 58 35 L 50 40 L 42 35 Z" transform="rotate(255 50 50)" />
                <path d="M 50 15 L 58 35 L 50 40 L 42 35 Z" transform="rotate(285 50 50)" />
                <path d="M 50 15 L 58 35 L 50 40 L 42 35 Z" transform="rotate(315 50 50)" />
                <path d="M 50 15 L 58 35 L 50 40 L 42 35 Z" transform="rotate(345 50 50)" />
            </g>

            <g class="mandala-circle">
                <circle cx="50" cy="50" r="12" />
                <circle cx="50" cy="50" r="18" />
                <circle cx="50" cy="50" r="24" /> 
            </g>

            <g class="mandala-spinner">
                <circle cx="50" cy="50" r="5" opacity="0.6" />
                <path d="M 47 50 L 53 50 L 50 47 L 50 53 Z" opacity="0.8" />
            </g>
        </svg>
    </div>

    <script type="module">
        // This script uses the AudioWorklet (ambient-mixer-processor.js) to manage volume 
        // and mixing on a separate thread, providing the highest reliability for background audio.
        
        // 1. Get elements
        const spokenTrack = document.getElementById('spokenTrack');
        const soundscapeTrack = document.getElementById('soundscapeTrack');
        const birdsTrack = document.getElementById('birdsTrack');
        
        const soundscapeVolume = document.getElementById('soundscapeVolume');
        const soundscapeVolValue = document.getElementById('soundscapeVolValue');
        const birdsVolume = document.getElementById('birdsVolume');
        const birdsVolValue = document.getElementById('birdsVolValue');

        let audioContext;
        let gainNodes = {};
        let workletNode;
        let initialized = false;

        // 2. Ambient Track Configuration
        const ambientTracks = [
            { id: 'soundscape', track: soundscapeTrack, slider: soundscapeVolume, display: soundscapeVolValue },
            { id: 'birds', track: birdsTrack, slider: birdsVolume, display: birdsVolValue }
        ];

        // 3. Volume Update Function (Sends volume update to the Gain Node)
        function updateVolume(item) {
            const newVolume = parseFloat(item.slider.value);
            
            if (gainNodes[item.id]) {
                // Volume control via the persistent Gain Node
                gainNodes[item.id].gain.value = newVolume;
            } else {
                 // Fallback (only runs before Worklet init)
                 item.track.volume = newVolume;
            }
            
            // Update the displayed percentage value
            const percentage = Math.round(newVolume * 100);
            item.display.textContent = `${percentage}%`;
        }

        // 4. Initialize Audio Worklet and Graph
        async function initAudioWorklet() {
            if (initialized) {
                // Always try to resume the context on repeated touch/play attempts
                if (audioContext && audioContext.state === 'suspended') {
                     audioContext.resume().catch(e => console.error("Context resume failed:", e));
                }
                return;
            }

            audioContext = new (window.AudioContext || window.webkitAudioContext)();

            // 4a. Load the Worklet Processor file
            try {
                await audioContext.audioWorklet.addModule('ambient-mixer-processor.js');
            } catch (e) {
                console.error("Failed to load AudioWorklet module:", e);
                return;
            }

            // 4b. Connect HTML audio elements to the graph
            ambientTracks.forEach(item => {
                const source = audioContext.createMediaElementSource(item.track);
                const gainNode = audioContext.createGain();
                gainNodes[item.id] = gainNode;
                
                source.connect(gainNode);

                // Mute the HTML audio volume to ensure the Gain Node is the only volume control
                item.track.volume = 0;
                
                // Start the HTML track immediately. This allows the Worklet to "listen" to a live stream.
                item.track.play().catch(e => console.warn(`Initial HTML playback failed for ${item.id}. OK if due to user gesture.`));
            });
            
            // 4c. Create the AudioWorklet Node
            workletNode = new AudioWorkletNode(audioContext, 'ambient-mixer-processor', {
                numberOfInputs: ambientTracks.length,
                numberOfOutputs: 1,
                outputChannelCount: [audioContext.destination.maxChannelCount]
            });
            
            // 4d. Connect all Gain Nodes to the Worklet's inputs
            ambientTracks.forEach((item, index) => {
                gainNodes[item.id].connect(workletNode, 0, index); 
            });

            // 4e. Connect Worklet output to speakers
            workletNode.connect(audioContext.destination);

            initialized = true;
            console.log("AudioWorklet and Graph fully initialized.");

            // Apply initial volume settings from the sliders
            ambientTracks.forEach(updateVolume);
        }

        // 5. Synchronization Logic
        function syncAmbientTracks(action) {
            if (!initialized) return;

            if (action === 'play') {
                // 1. Ensure AudioContext is running
                if (audioContext.state !== 'running') {
                    audioContext.resume().catch(e => console.error("Context resume failed:", e));
                }
                
                // 2. Start all HTML audio elements (This is the trigger iOS respects)
                ambientTracks.forEach(item => {
                    item.track.play().catch(e => console.warn(`HTML playback error for ${item.id}:`, e));
                    updateVolume(item); // Ensure volume is up
                });
                
            } else if (action === 'pause') {
                // 3. Pause all HTML audio elements
                ambientTracks.forEach(item => {
                    item.track.pause();
                });
                
                // 4. Suspend the AudioContext (Optional, but good practice for battery)
                if (audioContext.state === 'running') {
                    audioContext.suspend();
                }
            }
        }

        // 6. Main Play/Pause Listeners (The source of truth for the lock screen)
        spokenTrack.addEventListener('play', () => {
            // 1. Initialize the system if not done already
            initAudioWorklet(); 
            
            // 2. Sync ambient tracks to the playing state
            syncAmbientTracks('play');
        });

        spokenTrack.addEventListener('pause', () => {
            syncAmbientTracks('pause');
        });
        
        // 7. Initial setup and listeners
        ambientTracks.forEach(item => {
            updateVolume(item); // Set initial volume display
            item.slider.addEventListener('input', () => updateVolume(item));
        });

        // 8. CRITICAL: User Gesture and Media Session API setup
        document.addEventListener('touchstart', initAudioWorklet, { once: true });
        document.addEventListener('click', initAudioWorklet, { once: true });
        
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: 'Nidra Meditation',
                artist: 'Soul Stillness (Worklet Stable)',
                album: 'Final Deployment',
            });
            navigator.mediaSession.setActionHandler('play', () => spokenTrack.play());
            navigator.mediaSession.setActionHandler('pause', () => spokenTrack.pause());
        }
    </script>
</body>
</html>

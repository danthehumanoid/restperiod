/* Container for each search result item */

}

}

/* The Exercise Title in the list */
.res-title {

}

/* The Buttons (+Warm Up / +Workout) */

    transition: 0.2s;
}

.add-small:hover {

}
        /* Vertical Stack for Filter Groups */
        .filter-grid { 
            display: flex; 
            flex-direction: column; 
            gap: 12px;

        :root {

        * { box-sizing: border-box; }

        /* HEADER & NAV */

    justify-content: space-between; 
    align-items: center; 
    padding: 15px 25px; 
    background: #000; 
    border-bottom: 1px solid #004d7a;

.nav-links a {

.nav-links a:hover { color: var(--brand-accent); }

        .btn-outline { background: transparent; border: 1px solid var(--brand-accent); color: var(--brand-accent); }

        /* BUILDER ITEMS - DRAG & DROP & ARROWS */
        .section-divider { background: #000; padding: 12px 15px; border-radius: 4px; margin: 20px 0 10px 0; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--brand-accent); cursor: pointer; transition: 0.2s; }
        .section-divider:hover { background: #050505; }
        
        .exercise-item { background: #001a2c; padding: 15px; border-radius: 6px; border: 1px solid #333; margin-bottom: 15px; position: relative; transition: transform 0.2s, border-color 0.2s; cursor: grab; }

        .exercise-item.dragging { opacity: 0.4; border: 2px dashed var(--brand-accent); }

        .move-controls { display: flex; flex-direction: column; gap: 4px; margin-right: 12px; align-items: center; }
        .move-arrow { cursor: pointer; color: var(--brand-accent); font-size: 0.9rem; opacity: 0.5; transition: 0.2s; }
        .move-arrow:hover { opacity: 1; transform: scale(1.2); }

        .exercise-name-title { font-size: 1.15rem; color: var(--brand-accent); font-family: 'Montserrat'; font-weight: 800; text-transform: uppercase; }
        
        .metrics-grid { display: grid; grid-template-columns: 0.6fr 1fr 1fr 1fr 1fr 0.4fr; gap: 5px; margin-top: 10px; }
        .metric-unit { display: flex; flex-direction: column; align-items: center; }
        .metric-unit label { font-size: 0.5rem; margin-bottom: 2px; color: var(--brand-accent); font-weight: 800; }
        .metric-unit input { font-size: 0.85rem; text-align: center; background: #000; border: 1px solid #004d7a; width: 100%; padding: 6px; color: white; border-radius: 4px; }

        /* TAB SYSTEM */
        .tab-container { display: flex; gap: 5px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 5px; }
        .tab { padding: 10px 18px; background: #001a2c; border: 1px solid #333; cursor: pointer; border-radius: 4px; font-size: 0.85rem; color: #888; transition: 0.2s; font-weight: 700; white-space: nowrap; }
        .tab.active { background: var(--brand-accent); color: black; font-weight: 800; box-shadow: 0 0 10px var(--brand-accent); }
        
        .modal { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); overflow: auto; animation: fadeIn 0.3s; }
        .modal-content { background: var(--card-bg); margin: 5% auto; padding: 30px; border: 1px solid var(--brand-accent); width: 95%; max-width: 500px; border-radius: 12px; text-align: center; }

        .history-row:hover { background: rgba(255,255,255,0.03); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    <script>
        async function deleteProgram(id) {
    // 1. Confirm with the user (Safety First!)
    if (!confirm("Are you sure you want to permanently delete this training block? This cannot be undone.")) {
        return;
    }

    try {
        // 2. Execute the delete command in PocketBase
        await pb.collection('programs').delete(id);
        
        // 3. UI Cleanup: If the program being deleted is the one currently open, reset the builder
        if (editingProgramId === id) {
            editingProgramId = null;
            programData = [{weekNum: 1, warmup: [], exercises: []}];
            document.getElementById('prog-name').value = "";
            renderTabs();
            renderLists();
            // Hide the cards if nothing is being edited anymore
            document.getElementById('schedule-card').style.display = 'none';
        }

        // 4. Refresh the history list so the deleted program disappears
        alert("Program deleted successfully.");
        await loadProgramHistory(); 

    } catch (e) {
        console.error("Delete Error:", e);
        alert("Error deleting program: " + e.message);
    }
}
        function deleteWeek() {
    // 1. Safety Check: Don't allow deleting if only one week exists
    if (programData.length <= 1) {
        alert("A program must have at least one week.");
        return;
    }

    // 2. Confirmation prompt to avoid accidental deletions
    if (confirm(`Are you sure you want to delete Week ${programData[currentWeekIndex].weekNum}?`)) {
        
        // 3. Remove the current week from the array
        programData.splice(currentWeekIndex, 1);

        // 4. Renumber remaining weeks so they are always 1, 2, 3, etc.
        programData.forEach((week, index) => {
            week.weekNum = index + 1;
        });

        // 5. Adjust currentWeekIndex so it doesn't point to a non-existent week
        if (currentWeekIndex >= programData.length) {
            currentWeekIndex = programData.length - 1;
        }

        // 6. Update the App State and UI
        saveHistory();  // For Undo/Redo support
        renderTabs();   // Refresh the Week Tabs at the top
        renderLists();  // Refresh the Warmup/Workout lists below
    }
}
        function duplicateWeek() {
    // 1. Check if there is a previous week to copy from
    if (currentWeekIndex === 0) {
        alert("Cannot copy previous week: You are on Week 1.");
        return;
    }

    // 2. Get the data from the previous week
    const prevWeek = programData[currentWeekIndex - 1];

    // 3. Create a deep copy of the warmup and exercises
    // We use JSON.parse(JSON.stringify()) to ensure we don't accidentally link the weeks
    const newWarmup = JSON.parse(JSON.stringify(prevWeek.warmup));
    const newExercises = JSON.parse(JSON.stringify(prevWeek.exercises));

    // 4. Overwrite the current week's data
    programData[currentWeekIndex].warmup = newWarmup;
    programData[currentWeekIndex].exercises = newExercises;

    // 5. Update UI and History
    saveHistory();
    renderLists();
    alert(`Copied data from Week ${prevWeek.weekNum} into the current week.`);
}

        const pb = new PocketBase('https://restperiod.org');
        let modalActiveTags = [];
        let programData = [{weekNum:1, warmup: [], exercises:[]}];
        let currentWeekIndex = 0;
        let editingProgramId = null;
        let activeFilters = [];
        let warmupCollapsed = false;
        let draggedItemIndex = null;
        let draggedType = null;

        let history = [];

        const filterGroups = {
            "MOVEMENT": { "PUSH": "PUSH", "PULL": "PULL", "SQUAT": "SQUAT", "HINGE": "HINGE" },
            "ANGLE": { "HOR": "HORIZONTAL", "VER": "VERTICAL" },
            "LIMBS": { "DA": "DOUBLE ARM", "DL": "DOUBLE LEG", "SA": "SINGLE ARM", "SL": "SINGLE LEG" },
            "EQUIPMENT": { "BB": "BARBELL", "DB": "DUMBBELL", "BW": "BODYWEIGHT", "BND": "BAND" },
            "TYPE": { "MOB": "MOBILITY", "PRIMER": "PRIMER" },
            "BODY PART": { "UB": "UPPER BODY", "LB": "LOWER BODY" }
        };

        window.onload = async () => {
            if(!pb.authStore.isValid) window.location.href = 'index.html';

        // --- DASHBOARD & ROSTER ---
        async function loadDashboard() {
            try {
                const users = await pb.collection('users').getList(1, 100, { filter: 'role="client"', sort: 'name' });
                const tableBody = document.getElementById('client-table-body');
                const dropdown = document.getElementById('client-select');
                
                dropdown.innerHTML = '<option value="">-- Select Client --</option>' + 
                    users.items.map(u => `<option value="${u.id}">${u.name}</option>`).join('');

                tableBody.innerHTML = users.items.map(u => `
                    <tr onclick="selectClient('${u.id}')">
                        <td>${u.name}</td>
                        <td style="text-align:right; color:#555;">Active</td>
                    </tr>`).join('');
            } catch(e) { console.error("Roster Error:", e); }
        }

        function selectClient(id) {
            document.getElementById('client-select').value = id;
            loadProgramHistory();
        }

        // 1. Fetch only NON-archived programs for the main list
async function loadProgramHistory() {
    const cid = document.getElementById('client-select').value;
    if(!cid) return;
    document.getElementById('history-panel').style.display = 'block';
    try {
        // We added the filter: archived = false
        const progs = await pb.collection('programs').getList(1, 50, { 
            filter: `client="${cid}" && archived=false`, 
            sort: '-created' 
        });
        
        document.getElementById('history-list').innerHTML = progs.items.map(p => `
            <div class="history-row" style="display:flex; justify-content:space-between; align-items:center;">
                <span onclick="loadProgram('${p.id}')" style="cursor:pointer; font-weight:600;">${p.name}</span>
                <div style="display:flex; gap:12px;">
                    <i class="fas fa-archive" title="Archive" style="color:var(--brand-accent); cursor:pointer;" onclick="archiveProgram('${p.id}', true)"></i>
                    <i class="fas fa-trash" title="Permanent Delete" style="color:#ff4d4d; cursor:pointer;" onclick="deleteProgram('${p.id}')"></i>
                </div>
            </div>`).join('') || '<div style="color:#555; font-size:0.8rem; padding:10px;">No active programs.</div>';
            
    } catch(e) { console.error("History Error:", e); }
}

// 2. The Toggling Function
async function archiveProgram(id, shouldArchive) {
    const action = shouldArchive ? "Archive" : "Restore";
    if(!confirm(`${action} this program?`)) return;

    try {
        await pb.collection('programs').update(id, { archived: shouldArchive });
        
        // If archiving the currently open program, clear the builder
        if (shouldArchive && editingProgramId === id) {
            startNewProgram();
            document.getElementById('schedule-card').style.display = 'none';
        }
        
        alert(`Program ${action}d!`);
        loadProgramHistory(); // Refresh the list
    } catch(e) {
        alert("Error: " + e.message);
    }
}

        async function saveSectionTemplate(type) {
            const list = programData[currentWeekIndex][type];

            const name = prompt("Template Name:");
            if(!name) return;
            try {
                await pb.collection('templates').create({
                    name: name,
                    type: type === 'warmup' ? 'warmup' : 'workout',
                    workout_data: JSON.stringify(list)
                });
                alert("Section Template Saved!");
                await fetchSectionTemplates();
            } catch(e) { alert("Save Error: " + e.message); }

        async function deleteSectionTemplate() {
            const templateId = document.getElementById('section-template-select').value;
            if (!templateId) return alert("Select a template first.");

     async function loadSectionTemplate(id) {
    if(!id) return;
    try {
        const record = await pb.collection('templates').getOne(id);
        
        // Smart Parse: handles both string and object data
        let data = record.workout_data;
        if (typeof data === 'string') {
            data = JSON.parse(data);
        }

        // Determine where to put it based on the Template Type
        // If type is 'warmup', it goes to warmup. Otherwise, it goes to exercises.
        const targetSection = record.type === 'warmup' ? 'warmup' : 'exercises';
        
        // Append the template data to the existing list for the current week
        programData[currentWeekIndex][targetSection] = [
            ...programData[currentWeekIndex][targetSection], 
            ...data
        ];

        saveHistory(); 
        renderLists();
        
        // Reset the select menu so you can add another one if you want
        document.getElementById('section-template-select').value = "";
        
        console.log(`Successfully loaded ${record.name} into ${targetSection}`);
    } catch(e) { 
        console.error("Load Error:", e);
        alert("Load Error: " + e.message); 
    }
}
async function loadFullProgramTemplate(id) {
    if(!id) return;
    if(!confirm("This will replace all current weeks. Continue?")) {
        document.getElementById('full-template-select').value = "";
        return;
    }
    
    try {
        const record = await pb.collection('templates').getOne(id);
        let incoming = record.workout_data;
        
        // 1. Convert string to object if needed
        if (typeof incoming === 'string') incoming = JSON.parse(incoming);

        // 2. DEEP SEARCH: Look for the array of weeks
        // Check if it's the array itself, or if it's inside 'schedule' or 'weeks'
        let finalData = null;
        if (Array.isArray(incoming)) {
            finalData = incoming;
        } else if (incoming.schedule && Array.isArray(incoming.schedule)) {
            finalData = incoming.schedule;
        } else if (incoming.weeks && Array.isArray(incoming.weeks)) {
            finalData = incoming.weeks;
        }

        if (!finalData) {
            throw new Error("Could not find a valid list of weeks in this template.");
        }

        // 3. Apply and Refresh
        programData = finalData; 
        currentWeekIndex = 0; 
        
        saveHistory();
        renderTabs();
        renderLists();
        
        alert(`Loaded: ${record.name}`);
        document.getElementById('full-template-select').value = "";
    } catch(e) {
        console.error("Detailed Load Error:", e);
        alert("Load Error: " + e.message);
        document.getElementById('full-template-select').value = "";
    }
}

        function saveHistory() {

    if (history.length > 50) history.shift();
    historyIndex = history.length - 1;

}

        function undo() {
            if (historyIndex > 0) { historyIndex--; programData = JSON.parse(history[historyIndex]); renderLists(); renderTabs(); }

            if (historyIndex < history.length - 1) { historyIndex++; programData = JSON.parse(history[historyIndex]); renderLists(); renderTabs(); }

        // --- POSITION & SEARCH ---
        function moveElement(idx, type, dir) {
            const list = programData[currentWeekIndex][type];
            if(idx + dir < 0 || idx + dir >= list.length) return;
            [list[idx], list[idx+dir]] = [list[idx+dir], list[idx]];
            saveHistory(); renderLists();
        }

        function handleDrop(e, targetIdx, targetType) {
            e.currentTarget.style.borderTop = 'none';
            if(draggedType !== targetType) return;
            const list = programData[currentWeekIndex][targetType];
            const movedItem = list.splice(draggedItemIndex, 1)[0];
            list.splice(targetIdx, 0, movedItem);
            saveHistory(); renderLists();
        }

        function runLibrarySearch() {
            const q = document.getElementById('lib-search-text').value.toLowerCase();
            const res = exerciseDatabase.filter(e => {
                const textMatch = e.title.toLowerCase().includes(q) || e.searchStr.toLowerCase().includes(q);
                const filterMatch = activeFilters.every(f => e.searchStr.toUpperCase().includes(f));
                return textMatch && filterMatch;
            });

            document.getElementById('lib-results').innerHTML = res.slice(0, 40).map(e => `
                <div class="search-result">
                    <div class="res-title">${e.title.replace(/^([A-Z0-9-]{2,}\s*)+/, '')}</div>
                    <div class="res-actions">
                        <button class="add-small" onclick="addEx('${e.title.replace(/'/g, "\\'")}', 'warmup')">+ Warm Up</button>
                        <button class="add-small" onclick="addEx('${e.title.replace(/'/g, "\\'")}', 'exercises')">+ Workout</button>
                    </div>
                </div>`).join('');
        }

        function addEx(name, type) {

            programData[currentWeekIndex][type].push({ name: clean, grouping: "", setsData: [{reps: "10", weight: "0", tempo: "//", rpe: "7"}], notes: "" });
            saveHistory(); renderLists();

function triggerAutoSave() {
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => saveProgramToDB(true), 1500);
}

async function saveProgramToDB(silent = false) { 
    const cid = document.getElementById('client-select').value;
    if (!cid) {
        if (!silent) alert("Please select a client first.");
        return;
    }

    const payload = { 
        workout_data: JSON.stringify({ schedule: programData }), 
        client: cid, 
        name: document.getElementById('prog-name').value,
        description: document.getElementById('prog-desc').value
    }; 

    try {
        if (editingProgramId) {
            await pb.collection('programs').update(editingProgramId, payload);
        } else {
            const rec = await pb.collection('programs').create(payload);
            editingProgramId = rec.id;
        }

        if (!silent) {
            alert("PUBLISHED!");
        } else {
            // Show a subtle toast instead
            showSaveToast();
        }
    } catch(e) {
        if (!silent) alert("Save error: " + e.message);
    }
}

function showSaveToast() {
    let toast = document.getElementById('builder-toast');
    if (!toast) {
        toast = document.createElement('div');
        toast.id = 'builder-toast';
        toast.style.cssText = `
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #052e16; border: 1px solid #166534;
            color: #4ade80; padding: 8px 20px; border-radius: 50px;
            font-size: 0.75rem; font-weight: 800; font-family: 'Montserrat', sans-serif;
            z-index: 9999; opacity: 0; transition: opacity 0.3s;
            pointer-events: none;
        `;
        document.body.appendChild(toast);
    }
    toast.textContent = '✓ AUTO-SAVED';
    toast.style.opacity = '1';
    clearTimeout(toast._hideTimer);
    toast._hideTimer = setTimeout(() => toast.style.opacity = '0', 2000);
}

function renderReview() {
    const sel = document.getElementById('review-week-select');

        document.getElementById('review-content').innerHTML =

        return;

        ...(week.warmup || []).map(ex => ({...ex, section: 'Warm Up'})),

            : '';
        lastSection = ex.section;

        const cleanName = ex.name.replace(/^([A-Z0-9-]+\s)+/, '');
        const completedSets = (ex.setsData || []).filter(s => s.act_reps && s.act_weight).length;
        const totalSets = (ex.setsData || []).length;
        const allDone = completedSets === totalSets && totalSets > 0;

        const setsHtml = (ex.setsData || []).map((s, si) => {
            const hasData = s.act_reps || s.act_weight;
            const repsDiff = s.act_reps && s.reps
                ? parseInt(s.act_reps) - parseInt(s.reps)
                : null;
            const weightDiff = s.act_weight && s.weight
                ? parseFloat(s.act_weight) - parseFloat(s.weight)
                : null;
            const rpeDiff = s.act_rpe && s.rpe
                ? parseFloat(s.act_rpe) - parseFloat(s.rpe)
                : null;

            const diffColor = (val) => val === null ? '#555'
                : val > 0 ? '#4ade80'
                : val < 0 ? '#f87171'
                : '#888';

            const diffStr = (val, unit='') => val === null ? '—'
                : val === 0 ? `=${unit}`
                : val > 0 ? `+${val}${unit}`
                : `${val}${unit}`;

            return `<div style="background:${hasData ? '#050d12' : '#020c12'}; border:1px solid ${hasData ? '#1a2a35' : '#111'}; border-radius:6px; padding:8px; margin-bottom:6px; font-size:0.75rem;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:${hasData ? '6px' : '0'};">
                    <span style="color:var(--brand-accent); font-weight:800;">Set ${si+1}</span>
                    <span style="color:#444; font-size:0.65rem;">${s.reps} reps @ ${s.weight}kg / RPE ${s.rpe || '—'}</span>
                </div>
                ${hasData ? `
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:4px; text-align:center;">
                    <div>
                        <div style="font-size:0.55rem; color:#888; margin-bottom:2px;">REPS</div>
                        <div style="font-weight:800; color:white;">${s.act_reps || '—'}</div>
                        <div style="font-size:0.6rem; color:${diffColor(repsDiff)}">${diffStr(repsDiff)}</div>
                    </div>
                    <div>
                        <div style="font-size:0.55rem; color:#888; margin-bottom:2px;">WEIGHT</div>
                        <div style="font-weight:800; color:white;">${s.act_weight || '—'}kg</div>
                        <div style="font-size:0.6rem; color:${diffColor(weightDiff)}">${diffStr(weightDiff,'kg')}</div>
                    </div>
                    <div>
                        <div style="font-size:0.55rem; color:#888; margin-bottom:2px;">RPE</div>
                        <div style="font-weight:800; color:white;">${s.act_rpe || '—'}</div>
                        <div style="font-size:0.6rem; color:${diffColor(rpeDiff)}">${diffStr(rpeDiff)}</div>
                    </div>
                </div>
                ${s.act_note ? `<div style="margin-top:6px; padding:5px 8px; background:#111; border-radius:4px; color:#aaa; font-size:0.7rem; font-style:italic;">"${s.act_note}"</div>` : ''}
                ` : `<div style="color:#333; font-size:0.7rem;">Not completed</div>`}
            </div>`;
        }).join('');

        return `${sectionHeader}
        <div style="background:var(--card-bg); border:1px solid #1a2a35; border-radius:8px; padding:12px; margin-bottom:10px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <span style="font-family:'Montserrat'; font-weight:800; font-size:0.85rem; color:var(--brand-accent);">${cleanName}</span>
                <span style="font-size:0.65rem; padding:2px 8px; border-radius:4px; font-weight:800;
                    background:${allDone ? '#052e16' : completedSets > 0 ? '#1a2a1a' : '#1a1a1a'};
                    color:${allDone ? '#4ade80' : completedSets > 0 ? '#888' : '#444'};">
                    ${completedSets}/${totalSets} sets
                </span>
            </div>
            ${setsHtml}
        </div>`;
    }).join('');

    document.getElementById('review-content').innerHTML =
        `<div style="max-height:600px; overflow-y:auto;">${html}</div>`;
}
    </script>
</body>
</html>

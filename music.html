    <style>
        :root {
            --brand-yellow: #ffde59;
            --background-dark: #121212;
            --surface-dark: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #aaaaaa;
            --border-color: #333333;
        }

        /* --- Modern Setup & Typography --- */
        body {
            background-color: rgba(18, 18, 18, 0.85); /* Dark overlay for readability */
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
            background-image: url('dthhs.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-blend-mode: overlay;
        }
        a { color: var(--brand-yellow); text-decoration: none; transition: opacity 0.3s; }
        a:hover { opacity: 0.8; }
        h1, h2, h3 { font-weight: 600; }

        /* --- Header & Navigation --- */
        .page-header {
            text-align: center;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .site-title a {
            color: #ce0104;
            font-size: 2.5em;
            text-decoration: none;
            font-family: monospace;
        }
        nav ul { list-style: none; padding: 0; margin: 15px 0 0 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; }
        nav a { font-size: 1.1em; letter-spacing: 1px; }

        /* --- Download & Social Button Styling --- */
        .button-container {
            text-align: center;
            margin: 40px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }
        .yellow-btn {
            background-color: var(--brand-yellow);
            color: #000;
            padding: 12px 25px;
            font-weight: bold;
            border-radius: 8px;
            font-size: 1.1em;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s ease;
        }
        .yellow-btn:hover {
            transform: scale(1.05);
            opacity: 1; /* Override default link hover */
        }

        /* --- Section Styling --- */
        .epk-section {
            margin-bottom: 60px;
        }
        .section-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .section-header h2 { font-size: 2.5em; color: #ffffff; margin: 0; }
        .section-header p { font-style: italic; color: var(--text-secondary); margin: 5px 0 0 0; }

        /* --- Main Feature Layout (Video + Singles) --- */
        .main-feature-grid {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr; /* 25% | 50% | 25% */
            gap: 20px;
            align-items: flex-start;
        }
        .singles-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .video-column video {
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .music-item {
            background-color: var(--surface-dark);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }
        .music-item h3 {
            padding: 15px;
            margin: 0;
            background-color: #252525;
            font-size: 1.2em;
        }
        .music-item h3.highlight-title {
            color: var(--brand-yellow);
        }
        .music-item iframe {
            display: block;
            border: 0;
            width: 100%;
            margin-bottom: 10px; /* Added spacing */
        }
        .music-item iframe:last-child {
            margin-bottom: 0; /* Remove margin from the last iframe in a group */
        }

        /* --- Albums Grid --- */
        .albums-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        /* --- Footer --- */
        .page-footer { text-align: center; margin-top: 60px; color: var(--text-secondary); font-size: 0.9em; }
        
        /* --- Responsive Adjustments --- */
        @media (max-width: 1024px) {
            .main-feature-grid {
                grid-template-columns: 1fr; /* Stack columns on smaller screens */
            }
            .video-column {
                order: -1; /* Move video to the top on mobile */
            }
        }
    </style>
</head>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise Library | RestPeriod</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.3/pocketbase.umd.min.js"></script>
    <script src="exercises.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Open+Sans:wght@400;600&display=swap');
        
        :root { 
            --brand-bg: #020c12; 
            --card-bg: #0e1b24; 
            --brand-accent: #26C6DA; 
            --brand-blue: #007bff;
            --text-main: #E0F7FA;
            --input-bg: #002840;
        }

        body { margin: 0; font-family: 'Open Sans', sans-serif; background: var(--brand-bg); color: var(--text-main); padding-bottom: 50px; }
        * { box-sizing: border-box; }

        /* NAV */
        .nav-top { display: flex; justify-content: space-between; padding: 15px 25px; background: #000; border-bottom: 1px solid #004d7a; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .nav-links a { color: #888; text-decoration: none; margin-left: 20px; font-family: 'Montserrat'; font-weight: 700; font-size: 0.9rem; transition: 0.2s; }
        .nav-links a:hover { color: var(--brand-accent); }
        .nav-links a.active { color: white; border-bottom: 2px solid var(--brand-accent); }

        /* LAYOUT */
        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }

        /* SEARCH & FILTERS */
        .search-area { background: var(--card-bg); padding: 20px; border-radius: 8px; border: 1px solid #004d7a; margin-bottom: 20px; }
        
        input { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #004d7a; color: white; border-radius: 4px; font-size: 1rem; margin-bottom: 15px; }
        
        .filter-grid { display: flex; flex-wrap: wrap; gap: 20px; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-title { font-size: 0.6rem; color: #666; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; }

        .filter-btn { padding: 6px 12px; background: transparent; border: 1px solid var(--brand-blue); color: var(--brand-blue); border-radius: 4px; font-size: 0.7rem; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .filter-btn.active { background: var(--brand-blue); color: white; box-shadow: 0 0 10px rgba(0,123,255,0.4); }

        /* VIDEO GRID */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        .video-card { background: #001a2c; border: 1px solid #333; border-radius: 8px; overflow: hidden; transition: 0.2s; display: flex; flex-direction: column; }
        .video-card:hover { transform: translateY(-3px); border-color: var(--brand-accent); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        .video-wrapper { position: relative; padding-bottom: 56.25%; /* 16:9 Aspect Ratio */ height: 0; background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .card-info { padding: 15px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .ex-title { font-family: 'Montserrat'; font-weight: 700; font-size: 1rem; color: white; margin-bottom: 5px; text-transform: uppercase; line-height: 1.3; }
        .ex-tags { font-size: 0.65rem; color: #888; margin-top: 5px; }

        /* LOAD MORE */
        .load-more-container { text-align: center; margin-top: 40px; padding-bottom: 40px; }
        .btn-load { padding: 12px 30px; background: var(--brand-accent); border: none; font-weight: 800; font-family: 'Montserrat'; cursor: pointer; border-radius: 4px; color: #000; transition: 0.2s; }
        .btn-load:hover { background: #fff; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="nav-top">
        <div style="font-weight:800; font-size:1.4rem;">REST <span style="color:var(--brand-accent)">PERIOD</span></div>
        <div class="nav-links">
            <a href="index.html">DASHBOARD</a>
            <a href="templates.html">BUILDER</a>
            <a href="library.html" class="active">LIBRARY</a>
            <a href="#" onclick="pb.authStore.clear(); window.location.href='index.html'">LOGOUT</a>
        </div>
    </div>

    <div class="container">
        
        <div class="search-area">
            <input type="text" id="search-input" placeholder="Search exercises (e.g. 'Dumbbell Chest')..." onkeyup="resetAndRender()">
            
            <div class="filter-grid" id="filter-container">
                </div>
        </div>

        <div class="grid-container" id="video-grid">
            </div>

        <div class="load-more-container">
            <button id="load-btn" class="btn-load" onclick="loadNextBatch()">SHOW MORE (50+)</button>
        </div>

    </div>

    <script>
        const pb = new PocketBase('https://restperiod.org');
        
        // State
        let allExercises = [];
        let filteredList = [];
        let activeFilters = [];
        let currentPage = 1;
        const itemsPerPage = 50;

        // Advanced Filters (Matches Dashboard)
        const filterGroups = {
            "MOVEMENT": { "PUSH": "PUSH", "PULL": "PULL", "SQUAT": "SQUAT", "HINGE": "HINGE" },
            "ANGLE": { "HOR": "HORIZONTAL", "VER": "VERTICAL" },
            "LIMBS": { "DA": "DOUBLE ARM", "DL": "DOUBLE LEG", "SA": "SINGLE ARM", "SL": "SINGLE LEG" },
            "EQUIPMENT": { "BB": "BARBELL", "DB": "DUMBBELL", "BW": "BODYWEIGHT", "BND": "BAND" },
            "TYPE": { "MOB": "MOBILITY", "PRIMER": "PRIMER" },
            "BODY PART": { "UB": "UPPER BODY", "LB": "LOWER BODY" }
        };

        window.onload = async () => {
            if(!pb.authStore.isValid) window.location.href = 'index.html';
            
            setupFilters();
            await loadAllData();
        };

        // 1. Setup Filter Buttons
        function setupFilters() {
            const container = document.getElementById('filter-container');
            let html = '';
            for (const [groupName, options] of Object.entries(filterGroups)) {
                html += `
                    <div class="filter-group">
                        <span class="filter-title">${groupName}</span>
                        <div class="btn-group">
                            ${Object.entries(options).map(([tag, label]) => `
                                <button class="filter-btn" id="f-${tag}" onclick="toggleFilter('${tag}')">${label}</button>
                            `).join('')}
                        </div>
                    </div>`;
            }
            container.innerHTML = html;
        }

        // 2. Load Data (Static JS + PocketBase)
        async function loadAllData() {
            // Start with static list from exercises.js
            allExercises = (typeof exerciseDatabase !== 'undefined') ? [...exerciseDatabase] : [];

            // Add custom items from DB
            try {
                const recs = await pb.collection('custom_exercises').getFullList();
                recs.forEach(r => {
                    // Avoid duplicates by ID
                    if(!allExercises.some(e => e.id === r.id)) {
                        allExercises.push({
                            id: r.id, 
                            title: r.title, 
                            searchStr: r.searchStr || r.title, 
                            video: r.video
                        });
                    }
                });
            } catch(e) { console.log("Note: No custom exercises loaded or DB not reachable."); }

            // Initial Render
            resetAndRender();
        }

        // 3. Filter Logic
        function toggleFilter(tag) {
            const btn = document.getElementById(`f-${tag}`);
            if(activeFilters.includes(tag)) {
                activeFilters = activeFilters.filter(t => t !== tag);
                btn.classList.remove('active');
            } else {
                activeFilters.push(tag);
                btn.classList.add('active');
            }
            resetAndRender();
        }

        function resetAndRender() {
            currentPage = 1;
            const q = document.getElementById('search-input').value.toLowerCase();
            
            // Filter the master list
            filteredList = allExercises.filter(e => {
                const matchesText = e.title.toLowerCase().includes(q) || e.searchStr.toLowerCase().includes(q);
                const matchesTags = activeFilters.every(tag => e.searchStr.toUpperCase().includes(tag));
                return matchesText && matchesTags;
            });

            // Clear Grid
            document.getElementById('video-grid').innerHTML = "";
            renderBatch();
        }

        // 4. Rendering & Pagination
        function renderBatch() {
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const batch = filteredList.slice(start, end);
            const grid = document.getElementById('video-grid');
            const loadBtn = document.getElementById('load-btn');

            if(batch.length === 0 && currentPage === 1) {
                grid.innerHTML = `<div style="color:#666; grid-column:1/-1; text-align:center; padding:60px; font-size:1.2rem;">No exercises found matching criteria.</div>`;
                loadBtn.style.display = 'none';
                return;
            }

            batch.forEach(ex => {
                const videoUrl = convertToEmbed(ex.video);
                // Clean title (remove leading codes like "Dumbbell - ")
                const cleanTitle = ex.title.replace(/^([A-Z0-9-]{2,}\s*)+/, '');
                
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div class="video-wrapper">
                        ${videoUrl ? `<iframe src="${videoUrl}" loading="lazy" allowfullscreen></iframe>` : '<div style="height:100%; display:flex; align-items:center; justify-content:center; color:#444; background:#000;">No Video Available</div>'}
                    </div>
                    <div class="card-info">
                        <div class="ex-title">${cleanTitle}</div>
                        <div class="ex-tags">${(ex.searchStr || "").slice(0, 60).toLowerCase()}...</div>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Hide/Show Load More Button
            if (end >= filteredList.length) {
                loadBtn.style.display = 'none';
            } else {
                loadBtn.style.display = 'inline-block';
            }
        }

        function loadNextBatch() {
            currentPage++;
            renderBatch();
        }

        // Helper: Smart Video Converter (YouTube to Embed)
        function convertToEmbed(url) {
            if (!url) return null;
            if (url.includes("embed")) return url;
            
            let videoId = "";
            
            // Standard youtube.com/watch?v=ID
            if (url.includes("v=")) {
                videoId = url.split('v=')[1];
                const ampersandPosition = videoId.indexOf('&');
                if (ampersandPosition !== -1) {
                    videoId = videoId.substring(0, ampersandPosition);
                }
            } 
            // Short youtu.be/ID
            else if (url.includes("youtu.be/")) {
                videoId = url.split("youtu.be/")[1];
            }
            // Youtube Shorts
            else if (url.includes("/shorts/")) {
                videoId = url.split("/shorts/")[1];
            }

            if (videoId) return `https://www.youtube.com/embed/${videoId}`;
            return url; // Return original if not a standard YT link (might be Vimeo or file)
        }

    </script>
</body>
</html>

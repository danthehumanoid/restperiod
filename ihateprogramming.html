        * {

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .header {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }

        .filters-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .program-section {
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .filter-group {
            margin-bottom: 25px;
        }

        .filter-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2c3e50;
            font-size: 1rem;
        }

        select, input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px 5px;
            min-width: 140px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
        }

        .btn-export {
            background: linear-gradient(135deg, #27ae60, #229954);
        }

        .exercise-list {
            max-height: 400px;
            overflow-y: auto;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .exercise-item {
            padding: 15px;
            border-bottom: 1px solid #e1e8ed;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .exercise-item:hover {
            background: #f1f3f4;
            transform: translateX(5px);
        }

        .exercise-item:last-child {
            border-bottom: none;
        }

        .exercise-name {
            font-weight: 500;
            color: #2c3e50;
            flex: 1;
        }

        .exercise-details {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-left: 15px;
        }

        .program-list {
            min-height: 300px;
            border: 2px dashed #e1e8ed;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .program-exercise {
            background: linear-gradient(135deg, #ecf0f1, #bdc3c7);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .program-exercise-name {
            font-weight: 600;
            color: #2c3e50;
        }

        .remove-btn {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s ease;
        }

        .remove-btn:hover {
            background: #c0392b;
            transform: scale(1.1);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .empty-state {
            text-align: center;
            color: #7f8c8d;
            font-style: italic;
            padding: 40px;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .export-section {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        #exportOutput {
            width: 100%;
            height: 200px;
            margin-top: 10px;
            padding: 15px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9rem;
            resize: vertical;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Exercise Program Generator</h1>
            <p>Create customized workout programs for your PT clients</p>
        </div>

        <div class="main-content">
            <div class="filters-section">
                <h2 class="section-title">Exercise Filters</h2>
                
                <div class="filter-group">
                    <label for="bodyPart">Body Part/Joint:</label>
                    <select id="bodyPart">
                        <option value="">All Body Parts</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="equipment">Equipment:</label>
                    <select id="equipment">
                        <option value="">All Equipment</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="movement">Movement Pattern:</label>
                    <select id="movement">
                        <option value="">All Movements</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="searchInput">Search Exercises:</label>
                    <input type="text" id="searchInput" placeholder="Type to search exercises...">
                </div>

                <div class="stats">
                    <div class="stat-card">
                        <span class="stat-number" id="totalExercises">0</span>
                        <span class="stat-label">Total Exercises</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number" id="filteredExercises">0</span>
                        <span class="stat-label">Filtered Results</span>
                    </div>
                </div>

                <h3 class="section-title">Available Exercises</h3>
                <div class="exercise-list" id="exerciseList">
                    <div class="empty-state">Loading exercises...</div>
                </div>
            </div>

            <div class="program-section">
                <h2 class="section-title">Program Builder</h2>
                
                <div class="filter-group">
                    <label for="programName">Program Name:</label>
                    <input type="text" id="programName" placeholder="e.g., Lower Body Strength, Rehab Week 1" value="My Custom Program">
                </div>

                <div class="program-list" id="programList">
                    <div class="empty-state">Click exercises from the left to add them to your program</div>
                </div>

                <div style="text-align: center;">
                    <button class="btn btn-secondary" onclick="clearProgram()">Clear Program</button>
                    <button class="btn btn-export" onclick="exportToGoogleSheets()">Export to Google Sheets</button>
                </div>

                <div class="export-section">
                    <h3>Google Sheets Export:</h3>
                    <textarea id="exportOutput" placeholder="Your program will appear here in Google Sheets format..." readonly></textarea>
                    <button class="btn" onclick="copyToClipboard()">Copy to Clipboard</button>
                </div>
            </div>
        </div>
    </div>

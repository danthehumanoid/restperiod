<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Check-in | RestPeriod</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.3/pocketbase.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Open+Sans:wght@400;600&display=swap');
        
        :root {
            --brand-primary: #003B5C;
            --brand-secondary: #2E7D32;
            --brand-accent: #26C6DA;
            --brand-bg: #020c12;
            --text-main: #E0F7FA;
            --card-bg: #0e1b24;
            --border-color: #004d7a;
            --input-bg: #002840;
        }

        body { 
            margin: 0; 
            font-family: 'Open Sans', sans-serif; 
            background: var(--brand-bg); 
            color: var(--text-main); 
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            color: var(--brand-accent); 
            font-family: 'Montserrat'; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .subtitle { color: #888; margin-bottom: 30px; font-size: 0.9rem; }

        .card { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 16px; 
            border: 1px solid var(--border-color); 
            max-width: 500px; 
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        section { margin-bottom: 25px; }

        label { 
            display: flex; 
            justify-content: space-between;
            margin-bottom: 10px; 
            font-weight: 600; 
            color: #fff;
            font-size: 0.95rem;
        }

        .slider-group {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .slider-container { display: flex; align-items: center; gap: 15px; }
        
        input[type="range"] { 
            flex: 1; 
            accent-color: var(--brand-accent); 
            cursor: pointer;
            height: 6px;
        }

        .score { 
            font-family: 'Montserrat'; 
            font-weight: 800; 
            color: var(--brand-accent); 
            min-width: 25px; 
            text-align: right;
            font-size: 1.1rem;
        }

        .text-group label { margin-top: 20px; color: var(--brand-accent); font-family: 'Montserrat'; font-size: 0.8rem; letter-spacing: 1px;}

        textarea { 
            width: 100%; 
            height: 100px; 
            background: var(--input-bg); 
            color: white; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            padding: 12px; 
            margin-top: 8px; 
            box-sizing: border-box; 
            font-family: inherit;
            resize: none;
            transition: border 0.3s;
        }

        textarea:focus { outline: none; border-color: var(--brand-accent); }

        .btn { 
            width: 100%; 
            padding: 18px; 
            background: var(--brand-secondary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: 800; 
            font-family: 'Montserrat'; 
            margin-top: 30px; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: transform 0.2s, background 0.3s;
        }

        .btn:hover { background: #388E3C; transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }

        .nav-btn { margin-top: 25px; color: #555; text-decoration: none; font-size: 0.8rem; transition: color 0.3s; }
        .nav-btn:hover { color: var(--brand-accent); }
    </style>
</head>
<body>

    <h1>Weekly Check-In 🐓</h1>
    <p class="subtitle">Complete your reflection for the week</p>

    <div class="card">
        <div class="slider-group">
            <section>
                <label>⚡ Energy Level <span id="s-energy" class="score">5</span></label>
                <div class="slider-container">
                    <input type="range" min="1" max="10" value="5" oninput="upd(this, 's-energy')">
                </div>
            </section>

            <section>
                <label>😴 Sleep Quality <span id="s-sleep" class="score">5</span></label>
                <div class="slider-container">
                    <input type="range" min="1" max="10" value="5" oninput="upd(this, 's-sleep')">
                </div>
            </section>

            <section>
                <label>🧠 Mindset <span id="s-mind" class="score">5</span></label>
                <div class="slider-container">
                    <input type="range" min="1" max="10" value="5" oninput="upd(this, 's-mind')">
                </div>
            </section>

            <section>
                <label>🏋️ Training <span id="s-train" class="score">5</span></label>
                <div class="slider-container">
                    <input type="range" min="1" max="10" value="5" oninput="upd(this, 's-train')">
                </div>
            </section>

            <section>
                <label>🥗 Nutrition / Food <span id="s-food" class="score">5</span></label>
                <div class="slider-container">
                    <input type="range" min="1" max="10" value="5" oninput="upd(this, 's-food')">
                </div>
            </section>

            <section style="margin-bottom:0;">
                <label>🚶 Incidental Activity <span id="s-incidental" class="score">5</span></label>
                <div class="slider-container">
                    <input type="range" min="1" max="10" value="5" oninput="upd(this, 's-incidental')">
                </div>
            </section>
        </div>

        <div class="text-group">
            <label>WIN</label>
            <textarea id="win_field" placeholder="What went well? List your victories..."></textarea>

            <label>WORK ON</label>
            <textarea id="work_field" placeholder="Where did you struggle? What is the plan for next week?"></textarea>
        </div>

        <button class="btn" onclick="submitCheckin()">Submit Review</button>
    </div>

    <a href="index.html" class="nav-btn">← Back to Dashboard</a>

    <script>
        const pb = new PocketBase('https://restperiod.org');
        if(!pb.authStore.isValid) window.location.href = 'index.html';

        function upd(slider, id) {
            document.getElementById(id).innerText = slider.value;
        }

        async function submitCheckin() {
            const btn = document.querySelector('.btn');
            btn.innerText = "SUBMITTING...";
            btn.disabled = true;

            try {
                const data = {
                    client: pb.authStore.model.id,
                    energy: parseInt(document.getElementById('s-energy').innerText),
                    sleep: parseInt(document.getElementById('s-sleep').innerText),
                    mindset: parseInt(document.getElementById('s-mind').innerText),
                    training: parseInt(document.getElementById('s-train').innerText),
                    nutrition: parseInt(document.getElementById('s-food').innerText),
                    incidental: parseInt(document.getElementById('s-incidental').innerText),
                    WIN: document.getElementById('win_field').value,
                    WORK_ON: document.getElementById('work_field').value
                };

                await pb.collection('checkins').create(data);
                alert("✅ Success! Your check-in is saved.");
                window.location.href = 'index.html';
            } catch(e) {
                console.error("Error:", e);
                alert("Error: " + (e.data ? JSON.stringify(e.data) : e.message));
                btn.innerText = "SUBMIT REVIEW";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
